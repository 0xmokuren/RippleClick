included:
  - Sources

excluded:
  - .build

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 650
  error: 750

file_length:
  warning: 750
  error: 850

function_body_length:
  warning: 120
  error: 150
