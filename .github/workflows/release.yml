name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build App Bundle
        run: bash scripts/bundle.sh "${{ steps.version.outputs.version }}"

      - name: Create ZIP
        run: ditto -c -k --keepParent RippleClick.app "RippleClick-${{ steps.version.outputs.version }}.zip"

      - name: Generate Release Notes
        id: notes
        run: |
          # Get commits since previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            COMMITS=$(git log "$PREV_TAG".."$GITHUB_REF_NAME" --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download \`RippleClick-${{ steps.version.outputs.version }}.zip\`"
            echo "2. Unzip and move \`RippleClick.app\` to Applications"
            echo "3. Launch and grant Accessibility permission when prompted"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RippleClick v${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: "RippleClick-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: false
