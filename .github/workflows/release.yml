name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build App Bundle
        run: bash scripts/bundle.sh "${{ steps.version.outputs.version }}"

      - name: Create ZIP
        run: ditto -c -k --keepParent RippleClick.app "RippleClick-${{ steps.version.outputs.version }}.zip"

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 RippleClick-${{ steps.version.outputs.version }}.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$GITHUB_REF_NAME" ]; then
            COMMITS=$(git log "$PREV_TAG".."$GITHUB_REF_NAME" --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Installation"
            echo ""
            echo "\`\`\`bash"
            echo "brew tap 0xmokuren/tap"
            echo "brew install --cask rippleclick"
            echo "\`\`\`"
            echo ""
            echo "Or download \`RippleClick-${{ steps.version.outputs.version }}.zip\` below."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "RippleClick v${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: "RippleClick-${{ steps.version.outputs.version }}.zip"
          generate_release_notes: false

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/0xmokuren/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Casks/rippleclick.rb << 'RUBY'
          cask "rippleclick" do
            version "${{ steps.version.outputs.version }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"

            url "https://github.com/0xmokuren/RippleClick/releases/download/v#{version}/RippleClick-#{version}.zip"
            name "RippleClick"
            desc "macOS menu bar utility that shows ripple effects on left click"
            homepage "https://github.com/0xmokuren/RippleClick"

            app "RippleClick.app"

            zap trash: [
              "~/Library/Preferences/com.0xmokuren.RippleClick.plist",
            ]
          end
          RUBY

          # Remove leading spaces from heredoc
          sed -i '' 's/^          //' Casks/rippleclick.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/rippleclick.rb
          git commit -m "Update RippleClick to v${{ steps.version.outputs.version }}"
          git push
